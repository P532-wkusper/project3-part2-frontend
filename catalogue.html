<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - Patient Observation Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <h1>Patient Observation Tracker</h1>
        <nav>
            <a href="index.html">Patients</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="logs.html">Logs</a>
        </nav>
    </div>

    <div class="container">
        <h2>Catalogue</h2>
        
        <div id="alert"></div>

        <div class="grid-2">
            <div>
                <h3>Phenomenon Types</h3>
                <button class="btn btn-primary" onclick="showAddPhenomenonTypeModal()">Add Phenomenon Type</button>
                <div id="phenomenon-types-list" class="list"></div>
            </div>

            <div>
                <h3>Protocols</h3>
                <button class="btn btn-primary" onclick="showAddProtocolModal()">Add Protocol</button>
                <div id="protocols-list" class="list"></div>
            </div>
        </div>

        <div class="card">
            <h3>Phenomena</h3>
            <div class="form-group">
                <label for="phenomenonTypeSelect">Qualitative Phenomenon Type</label>
                <select id="phenomenonTypeSelect" onchange="loadPhenomenaForSelectedType()">
                    <option value="">Select a qualitative type...</option>
                </select>
            </div>

            <form onsubmit="createPhenomenonFromSection(event)">
                <div class="form-group">
                    <label for="newPhenomenonName">New Concrete Phenomenon Name</label>
                    <input type="text" id="newPhenomenonName" placeholder="e.g., BloodTypeA" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Phenomenon</button>
            </form>

            <h4>Phenomena For Selected Type</h4>
            <div id="selected-phenomena-list" class="list"></div>
        </div>
    </div>

    <div id="modal" class="modal"></div>

    <script>
        const API_BASE = 'https://patient-tracking-part1.onrender.com/api';

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function updateQualitativeTypeDropdown(phenomenonTypes) {
            const select = document.getElementById('phenomenonTypeSelect');
            const previousValue = select.value;

            const qualitativeTypes = phenomenonTypes.filter(pt => pt.kind === 'QUALITATIVE');
            select.innerHTML = '<option value="">Select a qualitative type...</option>';

            qualitativeTypes.forEach(pt => {
                const option = document.createElement('option');
                option.value = String(pt.id);
                option.textContent = pt.name;
                select.appendChild(option);
            });

            const previousStillExists = qualitativeTypes.some(pt => String(pt.id) === previousValue);
            if (previousStillExists) {
                select.value = previousValue;
            }

            loadPhenomenaForSelectedType();
        }

        function renderSelectedPhenomena(phenomena) {
            const container = document.getElementById('selected-phenomena-list');

            if (!phenomena || phenomena.length === 0) {
                container.innerHTML = '<p>No concrete phenomena for this type yet.</p>';
                return;
            }

            container.innerHTML = phenomena.map(p => `
                <div class="list-item" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${escapeHtml(p.name)}</strong>
                        <p>ID: ${p.id}</p>
                    </div>
                    <button class="btn btn-danger" onclick="deletePhenomenonAndRefresh(${p.id})">Delete</button>
                </div>
            `).join('');
        }

        function loadPhenomenaForSelectedType() {
            const select = document.getElementById('phenomenonTypeSelect');
            const selectedTypeId = select.value;
            const container = document.getElementById('selected-phenomena-list');

            if (!selectedTypeId) {
                container.innerHTML = '<p>Select a qualitative type to view its concrete phenomena.</p>';
                return;
            }

            container.innerHTML = '<p>Loading...</p>';

            fetch(`${API_BASE}/phenomenon-types/${selectedTypeId}/phenomena`)
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to load phenomena')))
                .then(phenomena => renderSelectedPhenomena(phenomena))
                .catch(e => {
                    container.innerHTML = '<p>Could not load phenomena.</p>';
                    showAlert('Error loading phenomena: ' + e.message, 'error');
                });
        }

        function createPhenomenonFromSection(event) {
            event.preventDefault();

            const typeId = document.getElementById('phenomenonTypeSelect').value;
            const nameInput = document.getElementById('newPhenomenonName');
            const name = nameInput.value.trim();

            if (!typeId) {
                showAlert('Select a qualitative phenomenon type first.', 'error');
                return;
            }

            fetch(`${API_BASE}/phenomenon-types/${typeId}/phenomena`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to create phenomenon')))
                .then(() => {
                    nameInput.value = '';
                    showAlert('Phenomenon created', 'success');
                    loadPhenomenaForSelectedType();
                })
                .catch(e => showAlert('Error creating phenomenon: ' + e.message, 'error'));
        }

        function loadCatalogue() {
            Promise.all([
                fetch(`${API_BASE}/phenomenon-types`).then(r => r.json()),
                fetch(`${API_BASE}/protocols`).then(r => r.json())
            ])
                .then(([phenomenonTypes, protocols]) => {
                    const ptList = document.getElementById('phenomenon-types-list');
                    ptList.innerHTML = phenomenonTypes.map(pt => {
                        let html = `
                            <div class="list-item">
                                <h4>${escapeHtml(pt.name)}</h4>
                                <p><strong>Kind:</strong> ${pt.kind}</p>`;
                        
                        if (pt.kind === 'QUALITATIVE') {
                            const escapedName = pt.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
                            html += `<button class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;" onclick="showManagePhenomenaModal(${pt.id}, '${escapedName}')">Manage Phenomena</button>`;
                        }
                        
                        html += `</div>`;
                        return html;
                    }).join('');

                    updateQualitativeTypeDropdown(phenomenonTypes);

                    const prList = document.getElementById('protocols-list');
                    prList.innerHTML = protocols.map(pr => `
                        <div class="list-item">
                            <h4>${pr.name}</h4>
                            <p><strong>Rating:</strong> ${pr.accuracyRating}</p>
                            <p>${pr.description || 'N/A'}</p>
                        </div>
                    `).join('');
                })
                .catch(e => showAlert('Error loading catalogue: ' + e.message, 'error'));
        }

        function showAddPhenomenonTypeModal() {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Add Phenomenon Type</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="createPhenomenonType(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="ptName" required>
                        </div>
                        <div class="form-group">
                            <label>Kind</label>
                            <select id="ptKind" required>
                                <option value="">Select...</option>
                                <option value="QUANTITATIVE">Quantitative</option>
                                <option value="QUALITATIVE">Qualitative</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
        }

        function createPhenomenonType(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('ptName').value,
                kind: document.getElementById('ptKind').value
            };

            fetch(`${API_BASE}/phenomenon-types`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Phenomenon type created', 'success');
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function showAddProtocolModal() {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Add Protocol</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="createProtocol(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="prName" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="prDesc"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Accuracy Rating</label>
                            <select id="prRating" required>
                                <option value="">Select...</option>
                                <option value="HIGH">High</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="LOW">Low</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
        }

        function createProtocol(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('prName').value,
                description: document.getElementById('prDesc').value,
                accuracyRating: document.getElementById('prRating').value
            };

            fetch(`${API_BASE}/protocols`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Protocol created', 'success');
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName) {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Manage Phenomena: ${phenomenonTypeName}</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <div id="phenomena-loading">Loading phenomena...</div>
                </div>
            `;
            modal.classList.add('active');
            
            // Load existing phenomena
            fetch(`${API_BASE}/phenomenon-types/${phenomenonTypeId}/phenomena`)
                .then(r => r.json())
                .then(phenomena => {
                    const phenomenaList = phenomena.map(p => `
                        <div class="list-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>${p.name}</span>
                                <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="deletePhenomenon(${p.id})">Delete</button>
                            </div>
                        </div>
                    `).join('');
                    
                    const content = document.querySelector('.modal-content');
                    content.innerHTML = `
                        <div class="modal-header">
                            <h2>Manage Phenomena: ${phenomenonTypeName}</h2>
                            <button class="close-btn" onclick="closeModal()">×</button>
                        </div>
                        <form onsubmit="createPhenomenon(event, ${phenomenonTypeId})">
                            <div class="form-group">
                                <label>Add New Phenomenon</label>
                                <input type="text" id="phenomenonName" placeholder="e.g., Blood Group A, Poor, Good" required>
                            </div>
                            <div class="actions">
                                <button type="submit" class="btn btn-primary">Add</button>
                            </div>
                        </form>
                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h4>Existing Phenomena</h4>
                        <div id="phenomena-list">${phenomenaList || '<p>No phenomena defined yet</p>'}</div>
                    `;
                })
                .catch(e => showAlert('Error loading phenomena: ' + e.message, 'error'));
        }

        function createPhenomenon(event, phenomenonTypeId) {
            event.preventDefault();
            const name = document.getElementById('phenomenonName').value;
            
            fetch(`${API_BASE}/phenomenon-types/${phenomenonTypeId}/phenomena`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    document.getElementById('phenomenonName').value = '';
                    showAlert('Phenomenon added', 'success');
                    // Reload the modal
                    const phenomenonTypeName = document.querySelector('.modal-header h2').textContent.replace('Manage Phenomena: ', '');
                    showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName);
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function deletePhenomenon(phenomenonId) {
            if (confirm('Are you sure you want to delete this phenomenon?')) {
                fetch(`${API_BASE}/phenomenon-types/phenomena/${phenomenonId}`, {
                    method: 'DELETE'
                })
                    .then(r => {
                        if (r.ok) {
                            showAlert('Phenomenon deleted successfully', 'success');
                            // Reload the modal if it's still open
                            const phenomenonTypeName = document.querySelector('.modal-header h2')?.textContent.replace('Manage Phenomena: ', '');
                            const phenomenonTypeId = document.querySelector('.modal-content form')?.getAttribute('onsubmit')?.match(/\d+/)?.[0];
                            if (phenomenonTypeName && phenomenonTypeId) {
                                showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName);
                            }
                        } else {
                            showAlert('Failed to delete phenomenon', 'error');
                        }
                    })
                    .catch(e => showAlert('Error deleting phenomenon: ' + e.message, 'error'));
            }
        }

        function deletePhenomenonAndRefresh(phenomenonId) {
            if (confirm('Are you sure you want to delete this phenomenon?')) {
                fetch(`${API_BASE}/phenomenon-types/phenomena/${phenomenonId}`, {
                    method: 'DELETE'
                })
                    .then(r => {
                        if (r.ok) {
                            showAlert('Phenomenon deleted successfully', 'success');
                            loadPhenomenaForSelectedType();
                        } else {
                            showAlert('Failed to delete phenomenon', 'error');
                        }
                    })
                    .catch(e => showAlert('Error deleting phenomenon: ' + e.message, 'error'));
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => alert.innerHTML = '', 5000);
        }

        loadCatalogue();
    </script>
</body>
</html>
