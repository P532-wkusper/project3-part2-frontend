<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - Patient Observation Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <h1>Patient Observation Tracker</h1>
        <nav>
            <a href="index.html">Patients</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="logs.html">Logs</a>
            <span id="user-info" style="margin-left: auto; font-size: 0.9rem;">Loading...</span>
        </nav>
    </div>

    <div class="container">
        <h2>Catalogue</h2>
        
        <div id="alert"></div>

        <div class="grid-2">
            <div>
                <h3>Phenomenon Types</h3>
                <button class="btn btn-primary" onclick="showAddPhenomenonTypeModal()">Add Phenomenon Type</button>
                <div id="phenomenon-types-list" class="list"></div>
            </div>

            <div>
                <h3>Protocols</h3>
                <button class="btn btn-primary" onclick="showAddProtocolModal()">Add Protocol</button>
                <div id="protocols-list" class="list"></div>
            </div>
        </div>

        <div class="card">
            <h3>Diagnostic Rules</h3>
            <button class="btn btn-primary" onclick="showAddRuleModal()">Add Diagnostic Rule</button>
            <div id="rules-list" class="list"></div>
        </div>

        <div class="card">
            <h3>Phenomena</h3>
            <div class="form-group">
                <label for="phenomenonTypeSelect">Qualitative Phenomenon Type</label>
                <select id="phenomenonTypeSelect" onchange="loadPhenomenaForSelectedType()">
                    <option value="">Select a qualitative type...</option>
                </select>
            </div>

            <form onsubmit="createPhenomenonFromSection(event)">
                <div class="form-group">
                    <label for="newPhenomenonName">New Concrete Phenomenon Name</label>
                    <input type="text" id="newPhenomenonName" placeholder="e.g., BloodTypeA" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Phenomenon</button>
            </form>

            <h4>Phenomena For Selected Type</h4>
            <div id="selected-phenomena-list"></div>
        </div>
    </div>

    <div id="modal" class="modal"></div>

    <script>
        const API_BASE = 'https://patient-tracking-part2-latest.onrender.com/api';
        let currentUser = null;

        function updateUserDisplay() {
            const userInfo = document.getElementById('user-info');
            if (currentUser) {
                userInfo.textContent = `${currentUser.username} (${currentUser.role})`;
            }
        }

        function initializeUser() {
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                updateUserDisplay();
                loadCatalogue();
            } else {
                alert('Please log in from the Patients page');
                window.location.href = 'index.html';
            }
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function updateQualitativeTypeDropdown(phenomenonTypes) {
            const select = document.getElementById('phenomenonTypeSelect');
            const previousValue = select.value;

            const qualitativeTypes = phenomenonTypes.filter(pt => pt.kind === 'QUALITATIVE');
            select.innerHTML = '<option value="">Select a qualitative type...</option>';

            qualitativeTypes.forEach(pt => {
                const option = document.createElement('option');
                option.value = String(pt.id);
                option.textContent = pt.name;
                select.appendChild(option);
            });

            const previousStillExists = qualitativeTypes.some(pt => String(pt.id) === previousValue);
            if (previousStillExists) {
                select.value = previousValue;
            }

            loadPhenomenaForSelectedType();
        }

        function renderSelectedPhenomena(phenomena) {
            const container = document.getElementById('selected-phenomena-list');

            if (!phenomena || phenomena.length === 0) {
                container.innerHTML = '<p>No concrete phenomena for this type yet.</p>';
                return;
            }

            container.innerHTML = phenomena.map(p => `
                <div class="list-item" style="display: flex !important; justify-content: space-between; align-items: center; overflow: visible !important;">
                    <div>
                        <strong>${escapeHtml(p.name)}</strong>
                        <p>ID: ${p.id}</p>
                    </div>
                    <button onclick="deletePhenomenonAndRefresh(${p.id})" style="background: #e74c3c; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; flex-shrink: 0;">Delete</button>
                </div>
            `).join('');
        }

        function loadPhenomenaForSelectedType() {
            const select = document.getElementById('phenomenonTypeSelect');
            const selectedTypeId = select.value;
            const container = document.getElementById('selected-phenomena-list');

            if (!selectedTypeId) {
                container.innerHTML = '<p>Select a qualitative type to view its concrete phenomena.</p>';
                return;
            }

            container.innerHTML = '<p>Loading...</p>';

            fetch(`${API_BASE}/phenomenon-types/${selectedTypeId}/phenomena`)
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to load phenomena')))
                .then(phenomena => renderSelectedPhenomena(phenomena))
                .catch(e => {
                    container.innerHTML = '<p>Could not load phenomena.</p>';
                    showAlert('Error loading phenomena: ' + e.message, 'error');
                });
        }

        function createPhenomenonFromSection(event) {
            event.preventDefault();

            const typeId = document.getElementById('phenomenonTypeSelect').value;
            const nameInput = document.getElementById('newPhenomenonName');
            const name = nameInput.value.trim();

            if (!typeId) {
                showAlert('Select a qualitative phenomenon type first.', 'error');
                return;
            }

            fetch(`${API_BASE}/phenomenon-types/${typeId}/phenomena`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to create phenomenon')))
                .then(() => {
                    nameInput.value = '';
                    showAlert('Phenomenon created', 'success');
                    loadPhenomenaForSelectedType();
                })
                .catch(e => showAlert('Error creating phenomenon: ' + e.message, 'error'));
        }

        function loadCatalogue() {
            Promise.all([
                fetch(`${API_BASE}/phenomenon-types`).then(r => r.json()),
                fetch(`${API_BASE}/protocols`).then(r => r.json()),
                fetch(`${API_BASE}/rules`).then(r => r.json())
            ])
                .then(([phenomenonTypes, protocols, rules]) => {
                    const ptList = document.getElementById('phenomenon-types-list');
                    ptList.innerHTML = phenomenonTypes.map(pt => {
                        let html = `
                            <div class="list-item">
                                <h4>${escapeHtml(pt.name)}</h4>
                                <p><strong>Kind:</strong> ${pt.kind}</p>`;
                        
                        if (pt.kind === 'QUALITATIVE') {
                            const escapedName = pt.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
                            html += `<button class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;" onclick="showManagePhenomenaModal(${pt.id}, '${escapedName}')">Manage Phenomena</button>`;
                        }
                        
                        html += `</div>`;
                        return html;
                    }).join('');

                    updateQualitativeTypeDropdown(phenomenonTypes);

                    const prList = document.getElementById('protocols-list');
                    prList.innerHTML = protocols.map(pr => `
                        <div class="list-item">
                            <h4>${pr.name}</h4>
                            <p><strong>Rating:</strong> ${pr.accuracyRating}</p>
                            <p>${pr.description || 'N/A'}</p>
                        </div>
                    `).join('');

                    const rlList = document.getElementById('rules-list');
                    rlList.innerHTML = rules.map(rule => {
                        const conditionsText = rule.conditions.map(c => {
                            const op = c.operator === '>' ? 'greater than' : c.operator === '<' ? 'less than' : c.operator === '=' ? 'equals' : c.operator;
                            const value = c.comparisonValue ? ` ${c.comparisonValue}` : '';
                            return `${c.phenomenonTypeName} ${op}${value}`;
                        }).join(', ');
                        return `
                            <div class="list-item">
                                <h4>${escapeHtml(rule.name)}</h4>
                                <p><strong>Strategy:</strong> ${rule.strategyType || 'CONJUNCTIVE'}${rule.threshold ? ' (threshold: ' + rule.threshold + ')' : ''}</p>
                                <p><strong>Conditions:</strong> ${conditionsText || 'No conditions'}</p>
                                <p><strong>Then infer:</strong> ${escapeHtml(rule.productConceptName)}</p>
                                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                                    <button class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="showEditRuleModal(${rule.id})">Edit</button>
                                    <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="deleteRule(${rule.id})">Delete</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                })
                .catch(e => showAlert('Error loading catalogue: ' + e.message, 'error'));
        }

        function showAddPhenomenonTypeModal() {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Add Phenomenon Type</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="createPhenomenonType(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="ptName" required>
                        </div>
                        <div class="form-group">
                            <label>Kind</label>
                            <select id="ptKind" required>
                                <option value="">Select...</option>
                                <option value="QUANTITATIVE">Quantitative</option>
                                <option value="QUALITATIVE">Qualitative</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
        }

        function createPhenomenonType(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('ptName').value,
                kind: document.getElementById('ptKind').value
            };

            fetch(`${API_BASE}/phenomenon-types`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Phenomenon type created', 'success');
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function showAddProtocolModal() {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Add Protocol</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="createProtocol(event)">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="prName" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="prDesc"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Accuracy Rating</label>
                            <select id="prRating" required>
                                <option value="">Select...</option>
                                <option value="HIGH">High</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="LOW">Low</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
        }

        function createProtocol(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('prName').value,
                description: document.getElementById('prDesc').value,
                accuracyRating: document.getElementById('prRating').value
            };

            fetch(`${API_BASE}/protocols`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Protocol created', 'success');
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName) {
            const modal = document.getElementById('modal');
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Manage Phenomena: ${phenomenonTypeName}</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <div id="phenomena-loading">Loading phenomena...</div>
                </div>
            `;
            modal.classList.add('active');
            
            // Load existing phenomena
            fetch(`${API_BASE}/phenomenon-types/${phenomenonTypeId}/phenomena`)
                .then(r => r.json())
                .then(phenomena => {
                    const phenomenaList = phenomena.map(p => `
                        <div class="list-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>${p.name}</span>
                                <button class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="deletePhenomenon(${p.id})">Delete</button>
                            </div>
                        </div>
                    `).join('');
                    
                    const content = document.querySelector('.modal-content');
                    content.innerHTML = `
                        <div class="modal-header">
                            <h2>Manage Phenomena: ${phenomenonTypeName}</h2>
                            <button class="close-btn" onclick="closeModal()">×</button>
                        </div>
                        <form onsubmit="createPhenomenon(event, ${phenomenonTypeId})">
                            <div class="form-group">
                                <label>Add New Phenomenon</label>
                                <input type="text" id="phenomenonName" placeholder="e.g., Blood Group A, Poor, Good" required>
                            </div>
                            <div class="actions">
                                <button type="submit" class="btn btn-primary">Add</button>
                            </div>
                        </form>
                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h4>Existing Phenomena</h4>
                        <div id="phenomena-list">${phenomenaList || '<p>No phenomena defined yet</p>'}</div>
                    `;
                })
                .catch(e => showAlert('Error loading phenomena: ' + e.message, 'error'));
        }

        function createPhenomenon(event, phenomenonTypeId) {
            event.preventDefault();
            const name = document.getElementById('phenomenonName').value;
            
            fetch(`${API_BASE}/phenomenon-types/${phenomenonTypeId}/phenomena`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed')))
                .then(() => {
                    document.getElementById('phenomenonName').value = '';
                    showAlert('Phenomenon added', 'success');
                    // Reload the modal
                    const phenomenonTypeName = document.querySelector('.modal-header h2').textContent.replace('Manage Phenomena: ', '');
                    showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName);
                })
                .catch(e => showAlert('Error: ' + e.message, 'error'));
        }

        function deletePhenomenon(phenomenonId) {
            if (confirm('Are you sure you want to delete this phenomenon?')) {
                fetch(`${API_BASE}/phenomenon-types/phenomena/${phenomenonId}`, {
                    method: 'DELETE'
                })
                    .then(r => {
                        if (r.ok) {
                            showAlert('Phenomenon deleted successfully', 'success');
                            // Reload the modal if it's still open
                            const phenomenonTypeName = document.querySelector('.modal-header h2')?.textContent.replace('Manage Phenomena: ', '');
                            const phenomenonTypeId = document.querySelector('.modal-content form')?.getAttribute('onsubmit')?.match(/\d+/)?.[0];
                            if (phenomenonTypeName && phenomenonTypeId) {
                                showManagePhenomenaModal(phenomenonTypeId, phenomenonTypeName);
                            }
                        } else {
                            showAlert('Failed to delete phenomenon', 'error');
                        }
                    })
                    .catch(e => showAlert('Error deleting phenomenon: ' + e.message, 'error'));
            }
        }

        function deletePhenomenonAndRefresh(phenomenonId) {
            if (confirm('Are you sure you want to delete this phenomenon?')) {
                fetch(`${API_BASE}/phenomenon-types/phenomena/${phenomenonId}`, {
                    method: 'DELETE'
                })
                    .then(r => {
                        if (r.ok) {
                            showAlert('Phenomenon deleted successfully', 'success');
                            loadPhenomenaForSelectedType();
                        } else {
                            showAlert('Failed to delete phenomenon', 'error');
                        }
                    })
                    .catch(e => showAlert('Error deleting phenomenon: ' + e.message, 'error'));
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function showAddRuleModal() {
            const phenomenonTypes = await fetch(`${API_BASE}/phenomenon-types`).then(r => r.json());
            const modal = document.getElementById('modal');
            
            const quantTypes = phenomenonTypes.filter(pt => pt.kind === 'QUANTITATIVE');
            const qualTypes = phenomenonTypes.filter(pt => pt.kind === 'QUALITATIVE');
            
            modal.innerHTML = `
                <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
                    <div class="modal-header">
                        <h2>Add Diagnostic Rule</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="createRule(event)">
                        <div class="form-group">
                            <label for="ruleName">Rule Name</label>
                            <input type="text" id="ruleName" placeholder="e.g., High Blood Pressure Alert" required>
                        </div>

                        <div class="form-group">
                            <label for="ruleProductConcept">Then Infer (Result Phenomenon Type)</label>
                            <select id="ruleProductConcept" required>
                                <option value="">Select phenomenon type...</option>
                                ${phenomenonTypes.map(pt => `<option value="${pt.id}">${escapeHtml(pt.name)}</option>`).join('')}
                            </select>
                        </div>

                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h3>Conditions (If all true, then infer result)</h3>
                        <div id="conditions-container"></div>

                        <button type="button" class="btn btn-secondary" style="margin-top: 1rem; width: 100%;" onclick="addConditionField()">+ Add Condition</button>

                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h3>Evaluation Strategy</h3>
                        
                        <div class="form-group">
                            <label for="ruleStrategy">Strategy Type</label>
                            <select id="ruleStrategy" onchange="toggleWeightedFields()" required>
                                <option value="">Select...</option>
                                <option value="CONJUNCTIVE">Conjunctive (All conditions must be met)</option>
                                <option value="WEIGHTED">Weighted Scoring (Conditions scored and summed)</option>
                            </select>
                        </div>

                        <div id="weighted-fields" style="display: none;">
                            <div class="form-group">
                                <label for="ruleThreshold">Threshold Score</label>
                                <input type="number" id="ruleThreshold" step="0.1" placeholder="e.g., 1.5" min="0">
                                <small>Minimum score needed for rule to fire</small>
                            </div>
                            <p style="margin-bottom: 1rem; padding: 0.5rem; background: #f0f0f0; border-radius: 4px; font-size: 0.9rem;">
                                <strong>Weights:</strong> Assign a weight to each condition above (visible when you view the conditions).
                            </p>
                        </div>

                        <div class="actions" style="margin-top: 1rem;">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create Rule</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
            
            // Initialize with one condition field
            addConditionField();
        }

        function addConditionField() {
            const container = document.getElementById('conditions-container');
            const index = container.children.length;
            
            fetch(`${API_BASE}/phenomenon-types`).then(r => r.json()).then(phenomenonTypes => {
                const quantTypes = phenomenonTypes.filter(pt => pt.kind === 'QUANTITATIVE');
                const qualTypes = phenomenonTypes.filter(pt => pt.kind === 'QUALITATIVE');
                
                const fieldHtml = `
                    <div class="condition-field" style="background: #f9f9f9; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #ddd;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <label style="margin: 0;">Condition ${index + 1}</label>
                            <button type="button" class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="this.closest('.condition-field').remove()">Remove</button>
                        </div>

                        <div class="form-group">
                            <label>Phenomenon Type</label>
                            <select class="condition-phenomenon-type" onchange="updateConditionOperators(this)" required>
                                <option value="">Select...</option>
                                <optgroup label="Quantitative">
                                    ${quantTypes.map(pt => `<option value="${pt.id}" data-kind="QUANTITATIVE">${escapeHtml(pt.name)}</option>`).join('')}
                                </optgroup>
                                <optgroup label="Qualitative">
                                    ${qualTypes.map(pt => `<option value="${pt.id}" data-kind="QUALITATIVE">${escapeHtml(pt.name)}</option>`).join('')}
                                </optgroup>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Condition Type</label>
                            <select class="condition-operator" required>
                                <option value="">Select...</option>
                                <optgroup label="Quantitative">
                                    <option value=">" class="quant-op">Greater than (&gt;)</option>
                                    <option value="<" class="quant-op">Less than (&lt;)</option>
                                    <option value="=" class="quant-op">Equals (=)</option>
                                </optgroup>
                                <optgroup label="Qualitative">
                                    <option value="PRESENT" class="qual-op">Is Present</option>
                                    <option value="ABSENT" class="qual-op">Is Absent</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="form-group condition-value-group" style="display: none;">
                            <label>Value</label>
                            <input type="number" step="0.01" class="condition-value" placeholder="e.g., 72">
                        </div>

                        <div class="form-group">
                            <label>Weight (for weighted strategy)</label>
                            <input type="number" step="0.1" class="condition-weight" value="1" min="0" placeholder="e.g., 1.5">
                            <small>Weight this condition contributes to the score</small>
                        </div>

                        <div class="form-group">
                            <label>Logical Operator (to next condition)</label>
                            <select class="condition-logical-op">
                                <option value="AND">AND (all must be true)</option>
                                <option value="OR">OR (any can be true)</option>
                            </select>
                        </div>
                    </div>
                `;
                container.innerHTML += fieldHtml;
                updateConditionOperators(container.querySelector('.condition-field:last-child .condition-phenomenon-type'));
            });
        }

        function updateConditionOperators(select) {
            const field = select.closest('.condition-field');
            const selectedOption = select.options[select.selectedIndex];
            const kind = selectedOption.getAttribute('data-kind');
            
            const operatorSelect = field.querySelector('.condition-operator');
            const valueGroup = field.querySelector('.condition-value-group');
            
            // Hide all options first
            Array.from(operatorSelect.options).forEach(opt => opt.style.display = 'none');
            
            if (kind === 'QUANTITATIVE') {
                operatorSelect.querySelector('.quant-op:nth-of-type(1)').style.display = '';
                operatorSelect.querySelector('.quant-op:nth-of-type(2)').style.display = '';
                operatorSelect.querySelector('.quant-op:nth-of-type(3)').style.display = '';
                valueGroup.style.display = 'block';
            } else if (kind === 'QUALITATIVE') {
                operatorSelect.querySelector('.qual-op:nth-of-type(1)').style.display = '';
                operatorSelect.querySelector('.qual-op:nth-of-type(2)').style.display = '';
                valueGroup.style.display = 'none';
            }
            
            operatorSelect.value = '';
        }

        function toggleWeightedFields() {
            const strategy = document.getElementById('ruleStrategy').value;
            const weightedFields = document.getElementById('weighted-fields');
            if (strategy === 'WEIGHTED') {
                weightedFields.style.display = 'block';
            } else {
                weightedFields.style.display = 'none';
            }
        }

        function createRule(event) {
            event.preventDefault();
            
            const name = document.getElementById('ruleName').value;
            const productConceptId = document.getElementById('ruleProductConcept').value;
            const strategyType = document.getElementById('ruleStrategy').value;
            const threshold = strategyType === 'WEIGHTED' ? parseFloat(document.getElementById('ruleThreshold').value) : null;
            const conditions = [];
            const argumentConceptWeights = {};
            
            document.querySelectorAll('.condition-field').forEach(field => {
                const phenomenonTypeId = field.querySelector('.condition-phenomenon-type').value;
                const operator = field.querySelector('.condition-operator').value;
                const comparisonValue = field.querySelector('.condition-value').value;
                const logicalOperator = field.querySelector('.condition-logical-op').value;
                const weight = parseFloat(field.querySelector('.condition-weight').value) || 1;
                
                if (phenomenonTypeId && operator) {
                    conditions.push({
                        phenomenonTypeId: phenomenonTypeId,
                        operator: operator,
                        comparisonValue: operator.match(/[><]|=/) ? (comparisonValue ? parseFloat(comparisonValue) : null) : null,
                        logicalOperator: logicalOperator
                    });
                    
                    argumentConceptWeights[phenomenonTypeId] = weight;
                }
            });
            
            if (conditions.length === 0) {
                showAlert('Add at least one condition', 'error');
                return;
            }
            
            if (!strategyType) {
                showAlert('Select a strategy type', 'error');
                return;
            }
            
            if (strategyType === 'WEIGHTED' && (!threshold || isNaN(threshold))) {
                showAlert('Enter a valid threshold for weighted strategy', 'error');
                return;
            }
            
            const payload = {
                name: name,
                productConceptId: productConceptId,
                conditions: conditions,
                strategyType: strategyType
            };
            
            if (strategyType === 'WEIGHTED') {
                payload.threshold = threshold;
                payload.argumentConceptWeights = argumentConceptWeights;
            }
            
            fetch(`${API_BASE}/rules`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to create rule')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Diagnostic rule created', 'success');
                })
                .catch(e => showAlert('Error creating rule: ' + e.message, 'error'));
        }

        async function showEditRuleModal(ruleId) {
            const rule = await fetch(`${API_BASE}/rules/${ruleId}`).then(r => r.json());
            const phenomenonTypes = await fetch(`${API_BASE}/phenomenon-types`).then(r => r.json());
            const modal = document.getElementById('modal');
            
            const quantTypes = phenomenonTypes.filter(pt => pt.kind === 'QUANTITATIVE');
            const qualTypes = phenomenonTypes.filter(pt => pt.kind === 'QUALITATIVE');
            
            modal.innerHTML = `
                <div class="modal-content" style="max-height: 90vh; overflow-y: auto;">
                    <div class="modal-header">
                        <h2>Edit Diagnostic Rule</h2>
                        <button class="close-btn" onclick="closeModal()">×</button>
                    </div>
                    <form onsubmit="updateRule(event, ${ruleId})">
                        <div class="form-group">
                            <label for="ruleName">Rule Name</label>
                            <input type="text" id="ruleName" value="${escapeHtml(rule.name)}" required>
                        </div>

                        <div class="form-group">
                            <label for="ruleProductConcept">Then Infer (Result Phenomenon Type)</label>
                            <select id="ruleProductConcept" required>
                                <option value="">Select phenomenon type...</option>
                                ${phenomenonTypes.map(pt => `<option value="${pt.id}" ${pt.id == rule.productConceptId ? 'selected' : ''}>${escapeHtml(pt.name)}</option>`).join('')}
                            </select>
                        </div>

                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h3>Conditions</h3>
                        <div id="conditions-container"></div>

                        <button type="button" class="btn btn-secondary" style="margin-top: 1rem; width: 100%;" onclick="addConditionField()">+ Add Condition</button>

                        <hr style="margin: 1rem 0; border: none; border-top: 1px solid #ddd;">
                        <h3>Evaluation Strategy</h3>
                        
                        <div class="form-group">
                            <label for="ruleStrategy">Strategy Type</label>
                            <select id="ruleStrategy" onchange="toggleWeightedFields()" required>
                                <option value="">Select...</option>
                                <option value="CONJUNCTIVE">Conjunctive (All conditions must be met)</option>
                                <option value="WEIGHTED">Weighted Scoring (Conditions scored and summed)</option>
                            </select>
                        </div>

                        <div id="weighted-fields" style="display: none;">
                            <div class="form-group">
                                <label for="ruleThreshold">Threshold Score</label>
                                <input type="number" id="ruleThreshold" step="0.1" placeholder="e.g., 1.5" min="0">
                                <small>Minimum score needed for rule to fire</small>
                            </div>
                            <p style="margin-bottom: 1rem; padding: 0.5rem; background: #f0f0f0; border-radius: 4px; font-size: 0.9rem;">
                                <strong>Weights:</strong> Assign a weight to each condition above (visible when you view the conditions).
                            </p>
                        </div>

                        <div class="actions" style="margin-top: 1rem;">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn btn-primary">Update Rule</button>
                        </div>
                    </form>
                </div>
            `;
            modal.classList.add('active');
            
            // Load existing conditions
            const container = document.getElementById('conditions-container');
            container.innerHTML = '';
            rule.conditions.forEach((cond, idx) => {
                const fieldHtml = `
                    <div class="condition-field" style="background: #f9f9f9; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #ddd;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <label style="margin: 0;">Condition ${idx + 1}</label>
                            <button type="button" class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size: 0.85rem;" onclick="this.closest('.condition-field').remove()">Remove</button>
                        </div>

                        <div class="form-group">
                            <label>Phenomenon Type</label>
                            <select class="condition-phenomenon-type" value="${cond.phenomenonTypeId}" onchange="updateConditionOperators(this)" required>
                                <option value="">Select...</option>
                                <optgroup label="Quantitative">
                                    ${quantTypes.map(pt => `<option value="${pt.id}" data-kind="QUANTITATIVE" ${pt.id == cond.phenomenonTypeId ? 'selected' : ''}>${escapeHtml(pt.name)}</option>`).join('')}
                                </optgroup>
                                <optgroup label="Qualitative">
                                    ${qualTypes.map(pt => `<option value="${pt.id}" data-kind="QUALITATIVE" ${pt.id == cond.phenomenonTypeId ? 'selected' : ''}>${escapeHtml(pt.name)}</option>`).join('')}
                                </optgroup>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Condition Type</label>
                            <select class="condition-operator" value="${cond.operator}" required>
                                <option value="">Select...</option>
                                <optgroup label="Quantitative">
                                    <option value=">" class="quant-op" ${cond.operator === '>' ? 'selected' : ''}>Greater than (&gt;)</option>
                                    <option value="<" class="quant-op" ${cond.operator === '<' ? 'selected' : ''}>Less than (&lt;)</option>
                                    <option value="=" class="quant-op" ${cond.operator === '=' ? 'selected' : ''}>Equals (=)</option>
                                </optgroup>
                                <optgroup label="Qualitative">
                                    <option value="PRESENT" class="qual-op" ${cond.operator === 'PRESENT' ? 'selected' : ''}>Is Present</option>
                                    <option value="ABSENT" class="qual-op" ${cond.operator === 'ABSENT' ? 'selected' : ''}>Is Absent</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="form-group condition-value-group">
                            <label>Value</label>
                            <input type="number" step="0.01" class="condition-value" value="${cond.comparisonValue || ''}" placeholder="e.g., 72">
                        </div>

                        <div class="form-group">
                            <label>Weight (for weighted strategy)</label>
                            <input type="number" step="0.1" class="condition-weight" value="1" min="0" placeholder="e.g., 1.5">
                            <small>Weight this condition contributes to the score</small>
                        </div>

                        <div class="form-group">
                            <label>Logical Operator (to next condition)</label>
                            <select class="condition-logical-op">
                                <option value="AND" ${cond.logicalOperator === 'AND' ? 'selected' : ''}>AND (all must be true)</option>
                                <option value="OR" ${cond.logicalOperator === 'OR' ? 'selected' : ''}>OR (any can be true)</option>
                            </select>
                        </div>
                    </div>
                `;
                container.innerHTML += fieldHtml;
            });
            
            // Set initial operator visibility
            document.querySelectorAll('.condition-phenomenon-type').forEach(select => {
                updateConditionOperators(select);
            });
            
            // Set strategy type and threshold from existing rule
            if (rule.strategyType) {
                document.getElementById('ruleStrategy').value = rule.strategyType;
                toggleWeightedFields();
            }
            if (rule.threshold !== null && rule.threshold !== undefined) {
                document.getElementById('ruleThreshold').value = rule.threshold;
            }
            
            // Set weights from argumentConceptWeights
            if (rule.argumentConceptWeights) {
                document.querySelectorAll('.condition-weight').forEach(input => {
                    const field = input.closest('.condition-field');
                    const phenomenonTypeId = field.querySelector('.condition-phenomenon-type').value;
                    if (rule.argumentConceptWeights[phenomenonTypeId]) {
                        input.value = rule.argumentConceptWeights[phenomenonTypeId];
                    }
                });
            }
        }

        function updateRule(event, ruleId) {
            event.preventDefault();
            
            const name = document.getElementById('ruleName').value;
            const productConceptId = document.getElementById('ruleProductConcept').value;
            const strategyType = document.getElementById('ruleStrategy').value;
            const threshold = strategyType === 'WEIGHTED' ? parseFloat(document.getElementById('ruleThreshold').value) : null;
            const conditions = [];
            const argumentConceptWeights = {};
            
            document.querySelectorAll('.condition-field').forEach(field => {
                const phenomenonTypeId = field.querySelector('.condition-phenomenon-type').value;
                const operator = field.querySelector('.condition-operator').value;
                const comparisonValue = field.querySelector('.condition-value').value;
                const logicalOperator = field.querySelector('.condition-logical-op').value;
                const weight = parseFloat(field.querySelector('.condition-weight').value) || 1;
                
                if (phenomenonTypeId && operator) {
                    conditions.push({
                        phenomenonTypeId: phenomenonTypeId,
                        operator: operator,
                        comparisonValue: operator.match(/[><]|=/) ? (comparisonValue ? parseFloat(comparisonValue) : null) : null,
                        logicalOperator: logicalOperator
                    });
                    
                    argumentConceptWeights[phenomenonTypeId] = weight;
                }
            });
            
            if (conditions.length === 0) {
                showAlert('Add at least one condition', 'error');
                return;
            }
            
            if (!strategyType) {
                showAlert('Select a strategy type', 'error');
                return;
            }
            
            if (strategyType === 'WEIGHTED' && (!threshold || isNaN(threshold))) {
                showAlert('Enter a valid threshold for weighted strategy', 'error');
                return;
            }
            
            const payload = {
                name: name,
                productConceptId: productConceptId,
                conditions: conditions,
                strategyType: strategyType
            };
            
            if (strategyType === 'WEIGHTED') {
                payload.threshold = threshold;
                payload.argumentConceptWeights = argumentConceptWeights;
            }
            
            fetch(`${API_BASE}/rules/${ruleId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
                .then(r => r.ok ? r.json() : Promise.reject(new Error('Failed to update rule')))
                .then(() => {
                    closeModal();
                    loadCatalogue();
                    showAlert('Diagnostic rule updated', 'success');
                })
                .catch(e => showAlert('Error updating rule: ' + e.message, 'error'));
        }

        function deleteRule(ruleId) {
            if (confirm('Are you sure you want to delete this diagnostic rule?')) {
                fetch(`${API_BASE}/rules/${ruleId}`, {
                    method: 'DELETE'
                })
                    .then(r => {
                        if (r.ok) {
                            loadCatalogue();
                            showAlert('Diagnostic rule deleted', 'success');
                        } else {
                            showAlert('Failed to delete rule', 'error');
                        }
                    })
                    .catch(e => showAlert('Error deleting rule: ' + e.message, 'error'));
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => alert.innerHTML = '', 5000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            initializeUser();
        });
    </script>
</body>
</html>
