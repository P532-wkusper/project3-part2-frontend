<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - Patient Observation Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .list-item {
            background: #f9f9f9;
            border-left: 4px solid #3498db;
            padding: 0.8rem;
            border-radius: 3px;
        }
        .undo-btn {
            background-color: #f39c12;
            color: white;
            padding: 0.3rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .undo-btn:hover {
            background-color: #e67e22;
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-executed {
            background-color: #d5f4e6;
            color: #27ae60;
        }
        .status-undone {
            background-color: #f0f0f0;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Patient Observation Tracker</h1>
        <nav>
            <a href="index.html">Patients</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="logs.html">Logs</a>
            <div class="user-menu-container">
                <button class="user-menu-toggle" id="user-menu-toggle" onclick="toggleUserMenu()">Loading...</button>
                <div class="user-menu-dropdown" id="user-menu-dropdown">
                    <a class="logout" onclick="logoutUser()">Logout</a>
                </div>
            </div>
        </nav>
    </div>

    <div class="container">
        <h2>System Logs</h2>
        
        <div id="alert"></div>
        
        <div class="grid-2">
            <div>
                <h3>Command Log</h3>
                <div id="command-log" class="list"></div>
            </div>

            <div>
                <h3>Audit Log</h3>
                <div id="audit-log" class="list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://patient-tracking-part2-latest.onrender.com/api';
        let currentUser = null;

        function updateUserDisplay() {
            const userMenuToggle = document.getElementById('user-menu-toggle');
            if (currentUser) {
                userMenuToggle.textContent = `👤 ${currentUser.username}`;
            }
        }

        function toggleUserMenu() {
            const dropdown = document.getElementById('user-menu-dropdown');
            dropdown.classList.toggle('active');
            
            // Close dropdown when clicking outside
            document.addEventListener('click', function closeMenu(event) {
                const container = document.querySelector('.user-menu-container');
                if (!container.contains(event.target)) {
                    dropdown.classList.remove('active');
                    document.removeEventListener('click', closeMenu);
                }
            });
        }

        function logoutUser() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            // Redirect to index which will show login screen
            window.location.href = 'index.html';
        }

        function initializeUser() {
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                updateUserDisplay();
                loadLogs();
            } else {
                alert('Please log in from the Patients page');
                window.location.href = 'index.html';
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.innerHTML = `<div class="${type === 'error' ? 'error' : 'success'}">${msg}</div>`;
            setTimeout(() => alert.innerHTML = '', 5000);
        }

        async function loadLogs() {
            try {
                const cmdResponse = await fetch(`${API_BASE}/command-log`);
                const commandLog = await cmdResponse.json();
                const cmdList = document.getElementById('command-log');
                cmdList.innerHTML = commandLog.map(entry => `
                    <div class="list-item">
                        <h4>${entry.commandType}</h4>
                        <p><strong>Executed:</strong> ${new Date(entry.executedAt).toLocaleString()}</p>
                        <p><strong>User:</strong> ${entry.user}</p>
                        <p><strong>Status:</strong> <span class="status-badge ${entry.undone ? 'status-undone' : 'status-executed'}">${entry.undone ? 'UNDONE' : 'EXECUTED'}</span></p>
                        ${!entry.undone && (entry.commandType === 'RECORD_MEASUREMENT' || entry.commandType === 'RECORD_CATEGORY_OBSERVATION' || entry.commandType === 'REJECT_OBSERVATION') 
                            ? `<button class="undo-btn" onclick="undoCommand(${entry.id}, '${entry.commandType}')">↶ Undo</button>` 
                            : ''}
                    </div>
                `).join('');
                
                const auditResponse = await fetch(`${API_BASE}/audit-log`);
                const auditLog = await auditResponse.json();
                const auditList = document.getElementById('audit-log');
                auditList.innerHTML = auditLog.length > 0 
                    ? auditLog.map(entry => `
                        <div class="list-item">
                            <h4>${entry.event}</h4>
                            <p><strong>Patient ID:</strong> ${entry.patientId}</p>
                            <p><strong>Observation ID:</strong> ${entry.observationId}</p>
                            <p><strong>Timestamp:</strong> ${new Date(entry.timestamp).toLocaleString()}</p>
                        </div>
                    `).join('')
                    : '<p>No audit log entries</p>';
            } catch (e) {
                showAlert('Error loading logs: ' + e.message, 'error');
            }
        }

        async function undoCommand(entryId, commandType) {
            if (!confirm('Are you sure you want to undo this ' + commandType + '?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/command-log/${entryId}/undo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    const result = await response.json();
                    showAlert('Command undone: ' + result.result, 'success');
                    loadLogs();
                } else {
                    const error = await response.json();
                    showAlert('Failed to undo: ' + (error.message || error.result || 'Unknown error'), 'error');
                }
            } catch (error) {
                showAlert('Error undoing command: ' + error.message, 'error');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initializeUser();
        });
    </script>
</body>
</html>
